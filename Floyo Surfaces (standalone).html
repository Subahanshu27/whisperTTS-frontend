document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Surfaces · Floyo DS<\u002Ftitle>\n<style>/* ─────────────────────────────────────────────────────────────────\n   Floyo Design System — colors & type\n   Source of truth: Figma \"Floyo! [DESIGN SYSTEM]\"\n   ───────────────────────────────────────────────────────────────── */\n\n/* Fonts ───────────────────────────────────────────────────────────\n   Brand fonts (self-hosted in /fonts):\n   - Roboto         → primary UI / body / headlines (variable .ttf)\n   - Janeiro        → chunky 70s display + decorative\n   - Arcade Pixel   → 8-bit display / retro flourishes\n   ───────────────────────────────────────────────────────────────── */\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"6fb6832e-7358-4642-80ee-210482a3ae71\") format(\"truetype-variations\"),\n       url(\"6fb6832e-7358-4642-80ee-210482a3ae71\") format(\"truetype\");\n  font-weight: 100 900;\n  font-stretch: 75% 125%;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"0ccf2db7-86f5-4beb-98cf-3748b3ab1f44\") format(\"truetype-variations\"),\n       url(\"0ccf2db7-86f5-4beb-98cf-3748b3ab1f44\") format(\"truetype\");\n  font-weight: 100 900;\n  font-stretch: 75% 125%;\n  font-style: italic;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Janeiro\";\n  src: url(\"2a71f2c9-9525-400f-adb1-19829f0fdedf\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Arcade Pixel\";\n  src: url(\"e646010d-83f6-4fb7-8130-894bbbaadfaa\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* Type families ------------------------------------------------ */\n  --ff-sans: \"Roboto\", system-ui, -apple-system, \"Helvetica Neue\", Arial, sans-serif;\n  --ff-display: \"Janeiro\", \"Roboto\", system-ui, sans-serif;\n  --ff-pixel: \"Arcade Pixel\", \"Roboto\", system-ui, monospace;\n  --ff-mono: ui-monospace, \"JetBrains Mono\", \"SF Mono\", Menlo, monospace;\n\n  /* ── Core scale: Ube Violet (PRIMARY) ── */\n  --ube-1: #F7F1FF;\n  --ube-2: #E6D4FF;\n  --ube-3: #D5B8FF;\n  --ube-4: #AF7FF4;\n  --ube-5: #8358D4;   /* primary */\n  --ube-6: #543294;\n  --ube-7: #3B1F52;\n  --ube-8: #2C173D;\n  --ube-9: #21152A;\n  --ube-10: #1A0C34;  /* near-black violet */\n\n  /* ── Grape (purple text-only neutral) ── */\n  --grape-1: #F7F1FF;\n  --grape-2: #E6D4FF;\n  --grape-3: #C4B4E0;\n  --grape-4: #AF7FF4;\n  --grape-5: #8358D4;\n  --grape-6: #715D98;\n  --grape-7: #5B487F;\n  --grape-8: #2C173D;\n  --grape-9: #21152A;\n  --grape-10: #1A0C34;\n\n  /* ── Lemon (warning / accent yellow) ── */\n  --lemon-1: #FFFDE8;\n  --lemon-2: #FFF9BC;\n  --lemon-3: #FFF48B;\n  --lemon-4: #FFEB28;\n  --lemon-5: #F5C813;\n  --lemon-6: #AA7100;\n  --lemon-7: #8F5A00;\n  --lemon-8: #744401;\n  --lemon-9: #653601;\n  --lemon-10: #532700;\n\n  /* ── Mint (success green) ── */\n  --mint-1: #E5FFF3;\n  --mint-2: #A6FFD6;\n  --mint-3: #56FFB1;\n  --mint-4: #3CE195;\n  --mint-5: #069252;\n  --mint-6: #005E33;\n  --mint-7: #014A28;\n  --mint-8: #01341C;\n  --mint-9: #002514;\n  --mint-10: #00190E;\n\n  /* ── Raspberry (danger pink/red) ── */\n  --raspberry-1: #FFECFC;\n  --raspberry-2: #FFCCE7;\n  --raspberry-3: #FF9BC4;\n  --raspberry-4: #FF6D95;\n  --raspberry-5: #EA2B6B;\n  --raspberry-6: #AD0347;\n  --raspberry-7: #8A0241;\n  --raspberry-8: #660130;\n  --raspberry-9: #410123;\n  --raspberry-10: #300019;\n\n  /* ── Blueberry (info blue) ── */\n  --blueberry-1: #EFF7FF;\n  --blueberry-2: #C3E4FF;\n  --blueberry-3: #9BD1FF;\n  --blueberry-4: #7AC0FF;\n  --blueberry-5: #409AEB;\n  --blueberry-6: #0D6BBE;\n  --blueberry-7: #00539E;\n  --blueberry-8: #004585;\n  --blueberry-9: #072846;\n  --blueberry-10: #001A31;\n\n  /* ── Cobalt (deep navy — API / technical inverted surface) ──\n     Added 26-05 from API-endpoint marketing page. Distinct from\n     Blueberry (which is brighter, info-blue). Cobalt is the\n     \"technical / dev / engineer\" counterpart to Ube (playful / product).\n     Use for: API docs surfaces, code snippets, developer marketing. */\n  --cobalt-1:  #EEF2FF;\n  --cobalt-2:  #D3DCFF;   /* tint — pixel-badge stroke */\n  --cobalt-3:  #A4BEFF;   /* light text on cobalt-9/10 */\n  --cobalt-4:  #7396FF;   /* primary accent / link on dark cobalt */\n  --cobalt-5:  #475DCE;   /* mid */\n  --cobalt-6:  #2E419E;   /* card border on dark */\n  --cobalt-7:  #192765;   /* divider / inner border */\n  --cobalt-8:  #101844;   /* HERO surface (page bg) */\n  --cobalt-9:  #0A102E;   /* card / panel surface on dark */\n  --cobalt-10: #050818;   /* deepest / scrim */\n\n  /* ── Tangerine (warm accent) ── */\n  --tangerine-1: #FFF5EE;\n  --tangerine-2: #FFD7BE;\n  --tangerine-3: #FFBC92;\n  --tangerine-4: #FF934F;\n  --tangerine-5: #DD5C28;\n  --tangerine-6: #AE3700;\n  --tangerine-7: #982B00;\n  --tangerine-8: #781E00;\n  --tangerine-9: #601000;\n  --tangerine-10: #3D0A00;\n\n  /* ── Strawberry (deep red) ── */\n  --strawberry-1: #FFEFF1;\n  --strawberry-2: #FFBDC8;\n  --strawberry-3: #FF7A90;\n  --strawberry-4: #FF5070;\n  --strawberry-5: #C6143B;\n  --strawberry-6: #930020;\n  --strawberry-7: #5E0014;\n  --strawberry-8: #4C0013;\n  --strawberry-9: #360010;\n  --strawberry-10: #29000C;\n\n  /* ── Shades ── */\n  --white: #FFFFFF;\n  --black: #000000;\n  --gray-line: #E2E2E2;\n  --gray-text: #8E8E8E;\n\n  /* Semantic ───────────────────────────────────────────────────── */\n  --bg: var(--white);\n  --bg-elevated: var(--white);\n  --bg-subtle: var(--ube-1);          /* faint violet wash */\n  --bg-inverted: var(--ube-10);       /* near-black violet — playful / product */\n  --bg-cobalt: var(--cobalt-8);       /* deep navy — technical / API / dev */\n  --bg-cobalt-deep: var(--cobalt-9);  /* card on cobalt surface */\n\n  --fg: #1A0C34;                      /* primary text — deep ube */\n  --fg-muted: var(--grape-7);         /* secondary text */\n  --fg-subtle: var(--gray-text);      /* tertiary / metadata */\n  --fg-on-violet: var(--white);\n  --fg-on-mint: var(--mint-10);\n  --fg-on-cobalt: var(--white);              /* primary text on cobalt surface */\n  --fg-on-cobalt-muted: var(--cobalt-3);     /* secondary text on cobalt — #A4BEFF */\n  --fg-on-cobalt-subtle: var(--cobalt-4);    /* tertiary / link on cobalt — #7396FF */\n\n  --border: var(--gray-line);\n  --border-strong: var(--ube-3);\n  --border-violet: var(--ube-4);\n  --border-cobalt: var(--cobalt-6);          /* card border on cobalt surface */\n  --border-cobalt-soft: var(--cobalt-7);     /* divider / inner border on cobalt */\n\n  --accent: var(--ube-5);             /* primary brand */\n  --accent-hover: var(--ube-6);\n  --accent-press: var(--ube-7);\n  --accent-fg: var(--white);\n\n  --success: var(--mint-5);\n  --success-fg: var(--mint-1);\n  --info: var(--blueberry-5);\n  --warning: var(--lemon-5);\n  --danger: var(--raspberry-5);\n\n  /* Spacing / radii / shadows ───────────────────────────────────── */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 48px;\n  --space-10: 64px;\n  --space-11: 80px;\n  --space-12: 120px;\n\n  --radius-xs: 2px;\n  --radius-sm: 5px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-2xl: 24px;\n  --radius-full: 999px;\n\n  /* Floyo doesn't lean on shadows — soft purple-tinted lift only */\n  --shadow-sm: 0 1px 2px rgba(26, 12, 52, 0.06);\n  --shadow-md: 0 4px 14px rgba(26, 12, 52, 0.08);\n  --shadow-lg: 0 18px 40px -12px rgba(26, 12, 52, 0.18);\n  --shadow-violet: 0 8px 24px -8px rgba(131, 88, 212, 0.45);\n  --shadow-cobalt: 0 8px 24px -8px rgba(115, 150, 255, 0.45);\n\n  /* Pixel halo glows — multi-layer ring stacks for pixel badges & chips.\n     Stacking order matches the Figma \"NEW!\" badge: outer soft halo,\n     inner halos, then a 1–2px crisp inner ring. Use on pixel badges,\n     status chips, the \"alpha tester\" sticker, etc. */\n  --pixel-halo-cobalt:\n    0 0 0 12px rgba(115,150,255,0.10),\n    0 0 0 6px  rgba(164,190,255,0.15),\n    0 0 0 2px  rgba(211,220,255,0.20),\n    inset 0 0 0 3px rgba(211,220,255,0.15),\n    inset 0 0 0 5px rgba(164,190,255,0.10);\n  --pixel-halo-violet:\n    0 0 0 12px rgba(131,88,212,0.10),\n    0 0 0 6px  rgba(175,127,244,0.15),\n    0 0 0 2px  rgba(213,184,255,0.20),\n    inset 0 0 0 3px rgba(213,184,255,0.15),\n    inset 0 0 0 5px rgba(175,127,244,0.10);\n  --pixel-halo-mint:\n    0 0 0 12px rgba(60,225,149,0.10),\n    0 0 0 6px  rgba(166,255,214,0.18),\n    0 0 0 2px  rgba(229,255,243,0.22),\n    inset 0 0 0 3px rgba(166,255,214,0.18),\n    inset 0 0 0 5px rgba(60,225,149,0.10);\n  --pixel-halo-lemon:\n    0 0 0 12px rgba(255,235,40,0.12),\n    0 0 0 6px  rgba(255,244,139,0.18),\n    0 0 0 2px  rgba(255,253,232,0.22),\n    inset 0 0 0 3px rgba(255,244,139,0.18),\n    inset 0 0 0 5px rgba(255,235,40,0.10);\n\n  /* Motion ──────────────────────────────────────────────────────── */\n  --ease-out: cubic-bezier(.2, .8, .2, 1);\n  --ease-in-out: cubic-bezier(.6, .04, .3, .96);\n  --dur-fast: 120ms;\n  --dur: 200ms;\n  --dur-slow: 360ms;\n}\n\n/* ─────────────────────────────────────────────────────────────────\n   Base text styles (desktop scale)\n   ───────────────────────────────────────────────────────────────── */\n.h1, .h2, .h3, .h4, .h5, .h6 { font-family: var(--ff-sans); color: var(--fg); margin: 0; }\n.h1 { font-weight: 800; font-size: 80px; line-height: 1.2; letter-spacing: -0.02em; }\n.h2 { font-weight: 600; font-size: 56px; line-height: 1.2; letter-spacing: -0.02em; }\n.h3 { font-weight: 600; font-size: 28px; line-height: 1.2; letter-spacing: -0.01em; }\n.h4 { font-weight: 600; font-size: 17px; line-height: 1.3; }\n.h5 { font-weight: 600; font-size: 14px; line-height: 1.3; }\n.h6 { font-weight: 600; font-size: 12px; line-height: 1.4; letter-spacing: 0.02em; text-transform: uppercase; }\n\n/* Display — Janeiro chunky retro display */\n.display-1, .display-2, .display-3, .display-4, .display-5 {\n  font-family: var(--ff-display); color: var(--fg); margin: 0; line-height: 1.05;\n  font-weight: 400; letter-spacing: 0;\n}\n.display-1 { font-size: 90px; }\n.display-2 { font-size: 64px; }\n.display-3 { font-size: 30px; }\n.display-4 { font-size: 19px; }\n.display-5 { font-size: 14px; letter-spacing: 0.05em; }\n\n/* Title — Arcade Pixel for retro 8-bit headlines */\n.title-1, .title-2, .title-3, .title-4, .title-5 {\n  font-family: var(--ff-pixel); color: var(--fg); margin: 0; line-height: 1.1;\n  font-weight: 400; letter-spacing: 0;\n}\n.title-1 { font-size: 90px; }\n.title-2 { font-size: 64px; }\n.title-3 { font-size: 30px; }\n.title-4 { font-size: 19px; }\n.title-5 { font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }\n\n/* Decorative — small Janeiro labels / kickers */\n.decorative-l { font-family: var(--ff-display); font-size: 30px; line-height: 1; letter-spacing: 0.02em; }\n.decorative-m { font-family: var(--ff-display); font-size: 19px; line-height: 1; letter-spacing: 0.02em; }\n.decorative-s { font-family: var(--ff-display); font-size: 14px; line-height: 1; letter-spacing: 0.02em; }\n\n/* Body */\n.body-l, .body-m, .body-s, .body-xs, .body-xxs { font-family: var(--ff-sans); color: var(--fg); margin: 0; }\n.body-l   { font-size: 17px; line-height: 1.5; letter-spacing: 0.01em; }\n.body-l-semi { font-size: 17px; line-height: 1.5; font-weight: 600; }\n.body-m   { font-size: 17px; line-height: 1.5; }\n.body-m-semi { font-size: 17px; line-height: 1.5; font-weight: 600; }\n.body-s   { font-size: 14px; line-height: 1.45; }\n.body-s-semi { font-size: 14px; line-height: 1.45; font-weight: 600; }\n.body-xs  { font-size: 12px; line-height: 1.4; }\n.body-xs-semi { font-size: 12px; line-height: 1.4; font-weight: 600; }\n.body-xxs { font-size: 10px; line-height: 1.4; }\n\n/* Accent / Buttons (uppercase tracked Roboto Semibold) */\n.accent-l { font-family: var(--ff-sans); font-weight: 600; font-size: 19px; line-height: 1.2; }\n.accent-m { font-family: var(--ff-sans); font-weight: 600; font-size: 19px; line-height: 1.2; }\n.accent-s { font-family: var(--ff-sans); font-weight: 600; font-size: 14px; line-height: 1.2; letter-spacing: 0.10em; text-transform: uppercase; }\n.button-l { font-family: var(--ff-sans); font-weight: 600; font-size: 19px; line-height: 1.2; letter-spacing: 0.10em; text-transform: uppercase; }\n.button-s { font-family: var(--ff-sans); font-weight: 600; font-size: 12px; line-height: 14px; letter-spacing: 0.03em; text-transform: uppercase; }\n\n/* Mono / code */\n.code, code, kbd, samp, pre { font-family: var(--ff-mono); font-size: 13px; }\n\n/* Default base (when applied to <body>) */\n.floyo-base {\n  font-family: var(--ff-sans);\n  color: var(--fg);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Pixel-perfect rendering for pixel-icon SVGs and pixel type */\n.pixelated, .pixel-icon img, .pixel-icon svg {\n  image-rendering: pixelated;\n  image-rendering: crisp-edges;\n  shape-rendering: crispEdges;\n}\n\n/* ─────────────────────────────────────────────────────────────────\n   Surface modifiers — apply to a section/page wrapper to flip the\n   semantic fg/border tokens to their on-dark counterparts. Children\n   that use --fg / --border / --fg-muted automatically follow.\n   ───────────────────────────────────────────────────────────────── */\n.surface-violet {\n  background: var(--bg-inverted);\n  color: var(--fg-on-violet);\n  --fg: #FFFFFF;\n  --fg-muted: var(--ube-3);          /* #D5B8FF */\n  --fg-subtle: var(--ube-4);         /* #AF7FF4 */\n  --border: rgba(213, 184, 255, 0.18);\n  --border-strong: var(--ube-4);\n  --bg: var(--ube-10);\n  --bg-elevated: var(--ube-9);\n  --bg-subtle: var(--ube-8);\n}\n.surface-cobalt {\n  background: var(--bg-cobalt);\n  color: var(--fg-on-cobalt);\n  --fg: #FFFFFF;\n  --fg-muted: var(--cobalt-3);       /* #A4BEFF */\n  --fg-subtle: var(--cobalt-4);      /* #7396FF */\n  --border: var(--cobalt-7);\n  --border-strong: var(--cobalt-6);\n  --bg: var(--cobalt-8);\n  --bg-elevated: var(--cobalt-9);\n  --bg-subtle: var(--cobalt-9);\n  --accent: var(--cobalt-4);         /* links / accents flip to cobalt-4 */\n  --accent-hover: var(--cobalt-3);\n}\n\n/* ─────────────────────────────────────────────────────────────────\n   Pixel halo badge — small chip with multi-layer pixel glow.\n   Usage:\n     <span class=\"pixel-badge pixel-badge-cobalt\">NEW!<\u002Fspan>\n     <span class=\"pixel-badge pixel-badge-mint\">LIVE<\u002Fspan>\n   Use ON dark surfaces (cobalt or violet); the halo bleeds outward.\n   Always pair with .title-5 typography (Arcade Pixel, uppercase).\n   ───────────────────────────────────────────────────────────────── */\n.pixel-badge {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  padding: 2px 8px;\n  border-radius: 4px;\n  font-family: var(--ff-pixel);\n  font-size: 14px;\n  line-height: 1.2;\n  letter-spacing: 0.10em;\n  text-transform: uppercase;\n  white-space: nowrap;\n}\n.pixel-badge-cobalt {\n  background: var(--cobalt-9);\n  border: 1px solid var(--cobalt-2);\n  color: var(--cobalt-2);\n  box-shadow: var(--pixel-halo-cobalt);\n}\n.pixel-badge-violet {\n  background: var(--ube-10);\n  border: 1px solid var(--ube-3);\n  color: var(--ube-3);\n  box-shadow: var(--pixel-halo-violet);\n}\n.pixel-badge-mint {\n  background: var(--mint-10);\n  border: 1px solid var(--mint-2);\n  color: var(--mint-2);\n  box-shadow: var(--pixel-halo-mint);\n}\n.pixel-badge-lemon {\n  background: var(--lemon-10);\n  border: 1px solid var(--lemon-3);\n  color: var(--lemon-3);\n  box-shadow: var(--pixel-halo-lemon);\n}\n\n/* ─────────────────────────────────────────────────────────────────\n   Section kicker — short uppercase tracked label that opens a\n   section. Reuses .title-5 type; adds tinted color variants matching\n   the section's accent. Use one accent per section, not all six.\n   ───────────────────────────────────────────────────────────────── */\n.kicker { font-family: var(--ff-pixel); font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.1; }\n.kicker-mint      { color: var(--mint-4);      }   /* #3CE195 — success / live */\n.kicker-cobalt    { color: var(--cobalt-3);    }   /* #A4BEFF — technical / API */\n.kicker-cobalt-bright { color: var(--cobalt-4); }  /* #7396FF — active / \"new\" */\n.kicker-lemon     { color: var(--lemon-4);     }   /* #FFEB28 — pricing / attention */\n.kicker-raspberry { color: var(--raspberry-4); }   /* #FF6D95 — danger / contrast */\n.kicker-violet    { color: var(--ube-3);       }   /* #D5B8FF — default on dark */\n\n/* ─────────────────────────────────────────────────────────────────\n   Comparison card pair — Without / With Floyo pattern.\n   Pair two .compare-card siblings inside a flex row.\n   ───────────────────────────────────────────────────────────────── */\n.compare-card {\n  border-radius: var(--radius-lg);\n  padding: 32px;\n  border: 1px solid var(--border);\n  background: var(--bg);\n}\n.compare-card-loss {\n  background: var(--strawberry-9);\n  border-color: var(--strawberry-5);\n  color: var(--white);\n}\n.compare-card-win {\n  background: var(--mint-8);\n  border: 1px dashed var(--mint-4);\n  color: var(--white);\n  box-shadow: 0 0 0 4px rgba(60, 225, 149, 0.08);\n}\n\n/* ─────────────────────────────────────────────────────────────────\n   Pixel-step CTA — \"+ Make a workflow.\" multi-color flourish.\n   Usage:\n     <p class=\"pixel-step-cta\">\n       <span class=\"step-plus\">+<\u002Fspan> Make\n       <span class=\"step-glow\"><\u002Fspan>\n       a workflow. Hit the endpoint.\n     <\u002Fp>\n   ───────────────────────────────────────────────────────────────── */\n.pixel-step-cta {\n  font-family: var(--ff-display);\n  font-size: 32px;\n  line-height: 1.2;\n  letter-spacing: -0.01em;\n  color: var(--fg);\n}\n.pixel-step-cta .step-plus { color: var(--cobalt-4); margin-right: 0.2em; }\n.pixel-step-cta .step-glow {\n  display: inline-block; width: 0.6em; height: 0.6em; vertical-align: middle;\n  background: var(--cobalt-4);\n  box-shadow: 0 0 24px 4px rgba(115, 150, 255, 0.6);\n  margin: 0 0.3em; border-radius: 2px;\n}\n<\u002Fstyle>\n\n<style>\n  html, body { margin: 0; padding: 0; font-family: var(--ff-sans); }\n  .grid { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }\n  .panel { padding: 56px 48px; }\n  .panel.surface-violet, .panel.surface-cobalt {\n    color: var(--fg);\n  }\n  .badge-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }\n  h2 { font-family: var(--ff-display); font-size: 44px; line-height: 1.15; letter-spacing: -0.02em; margin: 0 0 16px; max-width: 14ch; color: var(--fg); }\n  p.body { color: var(--fg-muted); max-width: 36ch; line-height: 1.6; margin: 0 0 32px; font-size: 15px; }\n  .button {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 12px 20px; border-radius: 999px;\n    font-family: var(--ff-sans); font-weight: 600; font-size: 14px;\n    letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none;\n  }\n  .button-primary { background: var(--lemon-4); color: var(--ube-10); }\n  .meta { font-family: var(--ff-mono); font-size: 11px; color: var(--fg-subtle); margin-top: 48px; }\n  .meta div { margin-bottom: 4px; }\n  .card {\n    background: var(--bg-elevated);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    padding: 20px;\n    margin-top: 24px;\n    max-width: 360px;\n  }\n  .card .name { font-weight: 600; font-size: 14px; color: var(--fg); }\n  .card .sub  { color: var(--fg-muted); font-size: 13px; margin-top: 4px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"grid\">\n    <section class=\"panel surface-violet\">\n      <div class=\"badge-row\">\n        <span class=\"pixel-badge pixel-badge-violet\">PRODUCT<\u002Fspan>\n        <span class=\"kicker kicker-violet\">FOR CREATORS<\u002Fspan>\n      <\u002Fdiv>\n      <h2>Run any workflow in your browser.<\u002Fh2>\n      <p class=\"body\">Browse, fork, and run thousands of community ComfyUI workflows — right in your browser. No GPU, no setup.<\u002Fp>\n      <a class=\"button button-primary\" href=\"#\">Browse workflows<\u002Fa>\n      <div class=\"card\">\n        <div class=\"name\">Pixel Portrait v3<\u002Fdiv>\n        <div class=\"sub\">@strawberry · 12.4k runs<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <div>section.surface-violet<\u002Fdiv>\n        <div>--bg · #1A0C34<\u002Fdiv>\n        <div>--fg-muted · #D5B8FF<\u002Fdiv>\n        <div>--accent · ube-5<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section class=\"panel surface-cobalt\">\n      <div class=\"badge-row\">\n        <span class=\"pixel-badge pixel-badge-cobalt\">NEW!<\u002Fspan>\n        <span class=\"kicker kicker-cobalt-bright\">API ACCESS IS LIVE!<\u002Fspan>\n      <\u002Fdiv>\n      <h2>Every workflow is an API endpoint.<\u002Fh2>\n      <p class=\"body\">Ship AI visual assets in your app without rolling your own backend. Pick a workflow, copy the endpoint — done.<\u002Fp>\n      <a class=\"button button-primary\" href=\"#\">Sign up<\u002Fa>\n      <div class=\"card\">\n        <div class=\"name\">POST /v1/run<\u002Fdiv>\n        <div class=\"sub\">Daisy-chain anything · one bill<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meta\">\n        <div>section.surface-cobalt<\u002Fdiv>\n        <div>--bg · #101844<\u002Fdiv>\n        <div>--fg-muted · #A4BEFF<\u002Fdiv>\n        <div>--accent · cobalt-4<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
