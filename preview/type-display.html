<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display & Title</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .col{display:flex;flex-direction:column;gap:14px}
  .meta{font-family:var(--ff-mono);font-size:10px;color:var(--ube-5)}
  h3.l{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-muted);margin:0 0 4px}
</style></head>
<body class="floyo-base">
  <div class="col">
    <h3 class="l">Display — Janeiro</h3>
    <div><div class="display-2" style="font-size:54px">Floyo!</div><div class="meta">Display 1 · 90 / Janeiro</div></div>
    <div><div class="display-3">Run any workflow</div><div class="meta">Display 3 · 30</div></div>
    <div><div class="decorative-m">Verified workflows</div><div class="meta">Decorative M · 19</div></div>
  </div>
  <div class="col">
    <h3 class="l">Title — Arcade Pixel Neue</h3>
    <div><div class="title-2" style="font-size:48px">FLOYO</div><div class="meta">Title 1 · 90 / pixel</div></div>
    <div><div class="title-3">PIXEL HEADLINE</div><div class="meta">Title 3 · 30</div></div>
    <div><div class="title-5">SECTION KICKER</div><div class="meta">Title 5 · 14 · tracked</div></div>
  </div>
</body></html>
