<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:16px;display:flex;gap:14px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:80px;height:80px;background:var(--ube-2);border:1px solid var(--ube-4)}
  .lbl{font-family:var(--ff-mono);font-size:10px;color:var(--ube-5)}
  .cap{font-size:11px;color:var(--fg)}
</style></head>
<body class="floyo-base">
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="cap">xs</div><div class="lbl">2px</div></div>
  <div class="item"><div class="box" style="border-radius:5px"></div><div class="cap">sm</div><div class="lbl">5px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="cap">md</div><div class="lbl">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="cap">lg</div><div class="lbl">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="cap">xl</div><div class="lbl">16px</div></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><div class="cap">2xl</div><div class="lbl">24px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="cap">full</div><div class="lbl">pill</div></div>
</body></html>
