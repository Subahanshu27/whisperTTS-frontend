<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0}
  body{font-family:var(--ff-sans);background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:0;height:150px}
  .pane{display:flex;align-items:center;justify-content:center;padding:24px}
  .light{background:#fff;color:var(--ube-10);border-right:1px solid var(--border)}
  .dark{background:var(--ube-10);color:#fff}
  img{height:60px;width:auto}
</style></head>
<body class="floyo-base">
  <div class="pane light"><img src="../assets/floyo-logo-light.svg" alt="Floyo" style="filter:none"></div>
  <div class="pane dark"><img src="../assets/floyo-logo-dark.svg" alt="Floyo"></div>
</body></html>
