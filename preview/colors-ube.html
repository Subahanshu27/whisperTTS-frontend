<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Ube Violet</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:16px}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}
  .sw{border-radius:8px;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid var(--border)}
  .sw .n{font-size:11px;font-weight:600;color:var(--fg)}
  .sw .h{font-size:10px;color:var(--fg-muted);font-family:var(--ff-mono)}
  .sw.dark .n,.sw.dark .h{color:#fff}
  h2{font-size:14px;margin:0 0 10px;font-weight:600;color:var(--fg);letter-spacing:.02em;text-transform:uppercase}
</style></head>
<body class="floyo-base">
  <h2>Ube Violet — primary scale</h2>
  <div class="row">
    <div class="sw" style="background:#F7F1FF"><div class="n">1</div><div class="h">F7F1FF</div></div>
    <div class="sw" style="background:#E6D4FF"><div class="n">2</div><div class="h">E6D4FF</div></div>
    <div class="sw" style="background:#D5B8FF"><div class="n">3</div><div class="h">D5B8FF</div></div>
    <div class="sw" style="background:#AF7FF4"><div class="n">4</div><div class="h">AF7FF4</div></div>
    <div class="sw dark" style="background:#8358D4"><div class="n">5 ●</div><div class="h">8358D4</div></div>
    <div class="sw dark" style="background:#543294"><div class="n">6</div><div class="h">543294</div></div>
    <div class="sw dark" style="background:#3B1F52"><div class="n">7</div><div class="h">3B1F52</div></div>
    <div class="sw dark" style="background:#2C173D"><div class="n">8</div><div class="h">2C173D</div></div>
    <div class="sw dark" style="background:#21152A"><div class="n">9</div><div class="h">21152A</div></div>
    <div class="sw dark" style="background:#1A0C34"><div class="n">10</div><div class="h">1A0C34</div></div>
  </div>
</body></html>
