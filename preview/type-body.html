<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body & Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .meta{font-family:var(--ff-mono);font-size:10px;color:var(--ube-5);margin-right:10px;display:inline-block;min-width:72px}
  .col{display:flex;flex-direction:column;gap:8px}
  h3.l{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-muted);margin:0 0 4px}
</style></head>
<body class="floyo-base">
  <div class="col">
    <h3 class="l">Body — Roboto</h3>
    <div><span class="meta">L 17/600</span><span class="body-l-semi">Body L Semibold</span></div>
    <div><span class="meta">M 17/400</span><span class="body-m">Run your workflow in seconds</span></div>
    <div><span class="meta">S 14/400</span><span class="body-s">Body small — secondary text and metadata</span></div>
    <div><span class="meta">XS 12/400</span><span class="body-xs">Body XS — captions, fine print</span></div>
    <div><span class="meta">XXS 10/400</span><span class="body-xxs">BODY XXS — labels</span></div>
  </div>
  <div class="col">
    <h3 class="l">Accent &amp; Buttons</h3>
    <div><span class="meta">Acc L 19</span><span class="accent-l">Accent L Semibold</span></div>
    <div><span class="meta">Acc S 14</span><span class="accent-s">ACCENT S — TRACKED</span></div>
    <div><span class="meta">Btn L 19</span><span class="button-l">Run workflow</span></div>
    <div><span class="meta">Btn S 12</span><span class="button-s">SAVE</span></div>
  </div>
</body></html>
