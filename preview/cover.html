<!doctype html>
<html><head><meta charset="utf-8"><title>Cover art</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--mint-8)}
  body{height:100%;display:flex;align-items:center;justify-content:center;color:var(--mint-4);font-family:var(--ff-display);font-size:42px;letter-spacing:-.01em;position:relative}
  .stack{display:flex;flex-direction:column;align-items:center;gap:14px}
  .logo{width:140px;color:var(--mint-4)}
  .label{font-family:var(--ff-display);font-size:54px;color:var(--mint-3);line-height:.95}
  .pixel{font-family:var(--ff-pixel);font-size:18px;letter-spacing:.15em;color:var(--mint-2)}
</style></head>
<body class="floyo-base">
  <div class="stack">
    <div class="pixel">FLOYO!</div>
    <div class="label">Design system</div>
    <img class="logo" src="../assets/floyo-logo-light.svg" alt="Floyo" style="filter:brightness(0) saturate(100%) invert(78%) sepia(88%) saturate(471%) hue-rotate(99deg)"/>
  </div>
</body></html>
