<!doctype html>
<html><head><meta charset="utf-8"><title>Color — Fruit accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:16px;display:flex;flex-direction:column;gap:14px}
  .row{display:grid;grid-template-columns:120px repeat(7,1fr);gap:6px;align-items:center}
  .name{font-weight:600;font-size:13px;color:var(--fg)}
  .sw{height:36px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding:0 6px;font-family:var(--ff-mono);font-size:9px}
  .sw.l{color:var(--fg-muted)}.sw.d{color:#fff}
</style></head>
<body class="floyo-base">
  <div class="row"><div class="name">Lemon</div>
    <div class="sw l" style="background:#FFFDE8"></div><div class="sw l" style="background:#FFF9BC"></div><div class="sw l" style="background:#FFF48B"></div><div class="sw l" style="background:#FFEB28"></div><div class="sw l" style="background:#F5C813"></div><div class="sw d" style="background:#AA7100"></div><div class="sw d" style="background:#532700"></div>
  </div>
  <div class="row"><div class="name">Mint</div>
    <div class="sw l" style="background:#E5FFF3"></div><div class="sw l" style="background:#A6FFD6"></div><div class="sw l" style="background:#56FFB1"></div><div class="sw l" style="background:#3CE195"></div><div class="sw d" style="background:#069252"></div><div class="sw d" style="background:#005E33"></div><div class="sw d" style="background:#00190E"></div>
  </div>
  <div class="row"><div class="name">Raspberry</div>
    <div class="sw l" style="background:#FFECFC"></div><div class="sw l" style="background:#FFCCE7"></div><div class="sw l" style="background:#FF9BC4"></div><div class="sw l" style="background:#FF6D95"></div><div class="sw d" style="background:#EA2B6B"></div><div class="sw d" style="background:#AD0347"></div><div class="sw d" style="background:#300019"></div>
  </div>
  <div class="row"><div class="name">Blueberry</div>
    <div class="sw l" style="background:#EFF7FF"></div><div class="sw l" style="background:#C3E4FF"></div><div class="sw l" style="background:#9BD1FF"></div><div class="sw l" style="background:#7AC0FF"></div><div class="sw d" style="background:#409AEB"></div><div class="sw d" style="background:#0D6BBE"></div><div class="sw d" style="background:#001A31"></div>
  </div>
  <div class="row"><div class="name">Tangerine</div>
    <div class="sw l" style="background:#FFF5EE"></div><div class="sw l" style="background:#FFD7BE"></div><div class="sw l" style="background:#FFBC92"></div><div class="sw l" style="background:#FF934F"></div><div class="sw d" style="background:#DD5C28"></div><div class="sw d" style="background:#AE3700"></div><div class="sw d" style="background:#3D0A00"></div>
  </div>
  <div class="row"><div class="name">Strawberry</div>
    <div class="sw l" style="background:#FFEFF1"></div><div class="sw l" style="background:#FFBDC8"></div><div class="sw l" style="background:#FF7A90"></div><div class="sw l" style="background:#FF5070"></div><div class="sw d" style="background:#C6143B"></div><div class="sw d" style="background:#930020"></div><div class="sw d" style="background:#29000C"></div>
  </div>
</body></html>
