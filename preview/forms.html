<!doctype html>
<html><head><meta charset="utf-8"><title>Forms</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-muted)}
  .input{font-family:var(--ff-sans);font-size:14px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--fg);outline:none}
  .input:focus{border-color:var(--ube-5);box-shadow:0 0 0 3px var(--ube-2)}
  .checkbox{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg)}
  .check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--ube-5);display:inline-grid;place-items:center;background:var(--ube-5);color:#fff;font-size:12px;font-weight:700}
  .toggle{width:36px;height:20px;border-radius:999px;background:var(--ube-5);position:relative}
  .toggle::after{content:"";position:absolute;top:2px;left:18px;width:16px;height:16px;border-radius:50%;background:#fff}
  .row{display:flex;align-items:center;gap:14px}
</style></head>
<body class="floyo-base">
  <div class="field"><label>Workflow name</label><input class="input" value="anime-portrait-v3"/></div>
  <div class="field"><label>Tag</label><input class="input" placeholder="add a tag…"/></div>
  <div class="field"><label>Visibility</label>
    <div class="row">
      <div class="checkbox"><span class="check">✓</span> Public</div>
      <div class="checkbox"><div class="toggle"></div> Verified only</div>
    </div>
  </div>
  <div class="field"><label>Description</label><textarea class="input" rows="2">Pixel-perfect portraits in 6 nodes.</textarea></div>
</body></html>
