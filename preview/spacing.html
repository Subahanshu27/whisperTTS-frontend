<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  body{font-family:var(--ff-sans);padding:16px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--fg-muted)}
  .bar{background:var(--ube-5);height:14px;border-radius:3px}
  .label{font-family:var(--ff-mono);min-width:90px;color:var(--ube-5)}
</style></head>
<body class="floyo-base">
  <div class="row"><span class="label">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="label">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="label">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="label">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="label">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="label">--space-7 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="label">--space-9 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="label">--space-10 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="label">--space-11 · 80</span><div class="bar" style="width:80px"></div></div>
  <div class="row"><span class="label">--space-12 · 120</span><div class="bar" style="width:120px"></div></div>
</body></html>
